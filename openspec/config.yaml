schema: spec-driven

context: |
  Tech stack: Node.js (>=22.12.0), pnpm, Astro (v7.0.4), TypeScript
  Architecture: Static site / SSR (Astro default)
  Testing: vitest (Unit testing available)
  Style: default / tsconfig strict

testing:
  strict_tdd: true
  runner: vitest
  coverage: null
  quality:
    linter: null
    type_checker: "tsc"
    formatter: null

rules:
  proposal:
    - Include rollback plan for risky changes
  specs:
    - Use Given/When/Then for scenarios
    - Use RFC 2119 keywords (MUST, SHALL, SHOULD, MAY)
  design:
    - Include sequence diagrams for complex flows
    - Document architecture decisions with rationale
  tasks:
    - Group by phase, use hierarchical numbering
    - Keep tasks completable in one session
  apply:
    - Follow existing code patterns
    tdd: false
    test_command: ""
  verify:
    test_command: "pnpm test && pnpm typecheck && pnpm build"
    build_command: "pnpm build"
    coverage_threshold: 0
  archive:
    - Warn before merging destructive deltas
